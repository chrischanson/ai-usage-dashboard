<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGY Quota Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AGY Quota Dashboard</h1>
            <div class="status-indicator">
                <span class="dot"></span> Live
            </div>
        </header>

        <main>
            <section class="overview-cards">
                <div class="card glass">
                    <h3>Total Sessions</h3>
                    <p id="total-sessions">--</p>
                </div>
                <div class="card glass">
                    <h3>Total Messages</h3>
                    <p id="total-messages">--</p>
                </div>
                <div class="card glass">
                    <h3>Total Cost</h3>
                    <p id="total-cost">--</p>
                </div>
                <div class="card glass">
                    <h3>Input Tokens</h3>
                    <p id="input-tokens">--</p>
                </div>
                <div class="card glass">
                    <h3>Output Tokens</h3>
                    <p id="output-tokens">--</p>
                </div>
            </section>

            <section class="charts-section">
                <div class="chart-container glass">
                    <h2>Historical Usage (Tokens)</h2>
                    <canvas id="historyChart"></canvas>
                </div>
                <div class="chart-container glass">
                    <h2>Model Usage Distribution</h2>
                    <canvas id="modelChart"></canvas>
                </div>
            </section>

            <section class="models-list">
                <h2>Active Models</h2>
                <div id="models-container" class="glass-container">
                    <!-- Model items will be inserted here -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
