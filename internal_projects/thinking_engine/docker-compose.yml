services:
  db:
    image: pgvector/pgvector:pg17
    container_name: thinking-engine-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engine-dev}
      POSTGRES_DB: ${POSTGRES_DB:-thinking_engine}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-engine}"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinking-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./app:/app/app:ro

  ollama:
    image: ollama/ollama:latest
    container_name: thinking-engine-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  pg_data:
  ollama_models:
