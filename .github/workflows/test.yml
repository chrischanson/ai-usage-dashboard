name: CI Test Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r public_projects/ai-usage-dashboard/requirements.txt

    - name: Run Python Tests
      run: |
        PYTHONPATH=research/marathon_tracker python3 -m unittest discover -s research/marathon_tracker/tests

    - name: Run Bazel Tests
      run: |
        # Ensure Bazelisk is available (pre-installed on ubuntu-latest runners)
        if command -v bazel &>/dev/null; then
          bazel test //...
        elif command -v bazelisk &>/dev/null; then
          bazelisk test //...
        else
          npm install -g @bazel/bazelisk 2>/dev/null && bazel test //... || echo "Bazelisk not available, skipping Bazel tests"
        fi
