name: Update Marathon Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

concurrency:
  group: marathon-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update tracker data
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4.1-mini' }}
        run: |
          python -m research.marathon_tracker.marathon_tracker.update

      - name: Commit updated research outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/marathon_tracker/docs/marathons.md
          git diff --cached --quiet || git commit -m "Update marathon tracker data"
          git push
