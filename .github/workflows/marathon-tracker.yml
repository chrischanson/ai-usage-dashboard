name: Update Marathon Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: marathon-tracker-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update tracker data
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4.1-mini' }}
        run: |
          python -m research.marathon_tracker.marathon_tracker.update

      - name: Commit updated research outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/marathon_tracker/docs
          git diff --cached --quiet || git commit -m "Update marathon tracker data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: research/marathon_tracker/docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
