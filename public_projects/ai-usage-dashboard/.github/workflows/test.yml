name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start server
        run: |
          cd backend && PYTHONPATH=. nohup python3 -m main > /dev/null 2>&1 &
          echo $! > /tmp/dashboard.pid
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Server ready (PID $(cat /tmp/dashboard.pid))"
              break
            fi
            if [ "$i" = 20 ]; then
              echo "Server failed to start"; exit 1
            fi
            sleep 1
          done

      - name: Run integration tests
        run: |
          PYTHONPATH=backend python3 verify.py

      - name: Run unit tests
        run: |
          PYTHONPATH=backend python3 -m unittest discover -s backend/tests

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/dashboard.pid ]; then
            kill $(cat /tmp/dashboard.pid) 2>/dev/null || true
            rm -f /tmp/dashboard.pid
          fi
